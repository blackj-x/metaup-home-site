<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141a2e"/>
      <stop offset="1" stop-color="#0f1320"/>
    </linearGradient>
    <radialGradient id="g1" cx="85%" cy="0%" r="60%">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="5%" cy="100%" r="55%">
      <stop offset="0" stop-color="#54d28a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#54d28a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="8%" cy="5%" r="45%">
      <stop offset="0" stop-color="#7a6bff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#7a6bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="0.55" stop-color="#7a6bff"/>
      <stop offset="1" stop-color="#ffcb45"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- logo 标记 -->
  <rect x="100" y="118" width="92" height="92" rx="24" fill="url(#title)"/>
  <text x="146" y="184" font-size="56" font-weight="900" fill="#0f1320" text-anchor="middle">▲</text>

  <!-- 主标题 -->
  <text x="100" y="328" font-size="92" font-weight="900" fill="url(#title)">MetaUp 攻略站群</text>
  <text x="104" y="404" font-size="38" font-weight="700" fill="#eef2ff">做厚、做准、原创的游戏攻略数据库</text>

  <!-- 副标题 -->
  <text x="104" y="462" font-size="29" fill="#9aa6c8">每款游戏一个专站 · 事实校验 · 原创 SVG 地图 · metaup.pro</text>

  <!-- 站群色点缀 -->
  <g transform="translate(104,516)">
    <rect x="0" y="0" width="180" height="48" rx="12" fill="rgba(91,140,255,0.16)"/>
    <text x="90" y="32" font-size="23" font-weight="700" fill="#5b8cff" text-anchor="middle">🦢 鹅鸭杀</text>
    <rect x="196" y="0" width="200" height="48" rx="12" fill="rgba(84,210,138,0.16)"/>
    <text x="296" y="32" font-size="23" font-weight="700" fill="#54d28a" text-anchor="middle">🛰 致命公司</text>
  </g>
</svg>
